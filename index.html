  Moon:{name:"The Moon",symbol:"🌑",headline:"The Overthinker in the Dark",color:"#b8c4d8",
    imbalance:"You live in the land between what is real and what is feared. Your imagination is vivid and your intuition is powerful — but in imbalance, you can't tell the difference between a genuine signal and anxiety dressed up as knowing. You second-guess yourself constantly, avoid clarity because clarity feels dangerous, and stay suspended in uncertainty because deciding means risking.",

  Tower:{name:"The Tower",symbol:"⚡",headline:"The Disruptor Who Fears Her Own Power",color:"#e07060",
    imbalance:"You know, somewhere deep, that the structures around you aren't built on truth. You've either already watched things collapse — relationships, careers, self-images — or you live in quiet terror that they will. In imbalance, you either unconsciously blow things up before they can disappoint you, or you grip so tight to what's left that no air gets in.",
    limitingBeliefs:["\"If I grow too much, I'll destroy what I love.\"","\"Chaos always finds me — why try?\"","\"The last time I took a risk, everything fell apart.\"","\"I have to control my environment or something bad happens.\""],

    shadow:"Learned helplessness. Using past evidence to make the future fixed.",
    movingForward:"Your path is toward The Sun — recognizing that the door was never locked from the outside. Once you find the exact moment this story started, its grip loosens almost immediately — choices that felt impossible last month start to feel obvious. You are not your patterns. You are the one who can see them.",

  Hierophant:{name:"The Hierophant",symbol:"🏛️",headline:"The Rule-Follower Waiting for Permission",color:"#c9a84c",

// ── Scoring ──
function score(answers){const t={};answers.forEach(a=>{if(!a)return;a.arcanas.forEach(k=>{t[k]=(t[k]||0)+1;});});const top=Object.entries(t).sort((a,b)=>b[1]-a[1])[0]?.[0]||'Moon';return ARCANA[top]||ARCANA.Moon;}

// ── EmailJS: sends full result to client AND BCC to Rose ──
async function sendResult(name,email,archetype,path,sunEnergy,beliefs,summary){
  try{
    const r=await emailjs.send(EJS_SVC, EJS_TPL,{
      to_name:       name||'Friend',
      to_email:      email,
      archetype:     archetype,
      path_forward:  path,
      sun_energy:    sunEnergy,
      beliefs:       beliefs,
      answer_summary: summary,
      session_dates: '4 Saturdays at 11am (NY, USA): July 11, July 18, July 25 & August 1',
      coach_email:   MY_EMAIL,
      reply_to:      MY_EMAIL,
    });
    console.log('Email sent - status:',r.status,r.text);
    // Show visible confirmation on screen
    const note=document.createElement('div');
    note.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1c3020;border:1px solid #4a8a5a;color:#a0d0a8;font-family:Jost,sans-serif;font-size:14px;padding:12px 24px;border-radius:8px;z-index:999;text-align:center';
    note.textContent='Your reading has been emailed to '+email;
    document.body.appendChild(note);
    setTimeout(()=>note.remove(),6000);
  }catch(e){
    console.error('EmailJS failed:',JSON.stringify(e));
    // Show visible error on screen
    const note=document.createElement('div');
    note.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#301c1c;border:1px solid #8a4a4a;color:#d0a0a0;font-family:Jost,sans-serif;font-size:13px;padding:12px 24px;border-radius:8px;z-index:999;text-align:center;max-width:320px';
    note.textContent='Email error: '+JSON.stringify(e).substring(0,80);
    document.body.appendChild(note);
    setTimeout(()=>note.remove(),8000);
  }
}

// ── Actions ──
function startQuiz(){S={screen:'quiz',current:0,answers:Array(QUESTIONS.length).fill(null),selected:null,showBeliefs:false,name:'',email:'',result:null};render();}
function selectOpt(i){S.selected=i;render();}
function goNext(){if(S.selected===null)return;S.answers[S.current]=QUESTIONS[S.current].options[S.selected];if(S.current<QUESTIONS.length-1){S.current++;S.selected=null;render();}else{S.screen='contact';render();}}
function goBack(){if(S.current===0){S.screen='intro';render();return;}S.current--;const prev=S.answers[S.current];S.selected=prev?QUESTIONS[S.current].options.indexOf(prev):null;render();}

async function submitContact(){
  const name=document.getElementById('inp-name').value.trim();
  const email=document.getElementById('inp-email').value.trim();
  if(!email){alert('Please enter your email to continue.');return;}
  S.name=name; S.email=email;
  S.screen='submitting'; render();
  S.result=score(S.answers);
  const r=S.result;
  const summary=S.answers.map((a,i)=>a?'Q'+(i+1)+': '+a.text:'').filter(Boolean).join(' | ');
  // Send email — this is our primary data capture
  await sendResult(name,email,r.name,r.movingForward,r.sunEnergy,r.limitingBeliefs.join(' | '),summary);
  S.screen='result'; render();
}

async function skipContact(){
  S.screen='submitting'; render();
  S.result=score(S.answers);
  S.screen='result'; render();
}

function toggleBeliefs(){S.showBeliefs=!S.showBeliefs;render();}
render();
</script>
