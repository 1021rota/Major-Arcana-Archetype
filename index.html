function score(answers){
  const t={};
  answers.forEach(a=>{if(!a)return;a.arcanas.forEach(k=>{t[k]=(t[k]||0)+1;});});
  const sorted=Object.entries(t).sort((a,b)=>b[1]-a[1]);
  const top=sorted[0]?.[0]||'Moon';
  return ARCANA[top]||ARCANA.Moon;
}

function showToast(msg,type){
  const d=document.createElement('div');
  d.className='toast toast-'+type;
  d.textContent=msg;
  document.body.appendChild(d);
  setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),300)},5000);
}

  try{

      answer_summary:summary,

      registration_deadline:'July 17 at 11:59pm (NY, USA)',
      coach_email:MY_EMAIL,
      reply_to:MY_EMAIL,

    showToast('Email: '+JSON.stringify(e).substring(0,60),'error');
  }
}

      </div>
      <div class="shadow-box" style="--arc-color:${r.color}">
        <p class="shadow-label">Shadow</p>
        <p class="shadow-text">${r.shadow}</p>
      </div>
      <div style="margin-bottom:14px">
        <div class="beliefs-row">
          <p class="section-label" style="color:#c9a84c;margin-bottom:0">Limiting Beliefs at the Root</p>
          <button class="toggle-btn" onclick="toggleBeliefs()">${S.showBeliefs?'Hide':'Reveal'}</button>
        </div>
        ${beliefs}
      </div>
      <div class="sun-card">
        <p class="sun-label">Your Path &#8594; Balance &amp; Abundance</p>
        <div class="locked-box">
          <div class="locked-icon">&#128274;</div>
          <p class="locked-text">Your Sun-energy path, the exact NLP tools for ${r.name}, and what your balanced expression looks like are saved for your free Clarity Call &#8212; where Rose walks you through it live.</p>
        </div>
      </div>
      ${ctaSection}
      <div class="retake-row"><button class="ghost-btn" onclick="startQuiz()">&#8617; Retake the Quiz</button></div>
    </div>`;
  }
}

function startQuiz(){S={screen:'quiz',current:0,answers:Array(QUESTIONS.length).fill(null),selected:null,showBeliefs:false,name:'',email:'',result:null};render();}
function selectOpt(i){S.selected=i;render();}
function goNext(){
  if(S.selected===null)return;
  S.answers[S.current]=QUESTIONS[S.current].options[S.selected];
  if(S.current<QUESTIONS.length-1){S.current++;S.selected=null;render();}
  else{S.screen='contact';render();}
}
function goBack(){
  if(S.current===0){S.screen='intro';render();return;}
  S.current--;
  const prev=S.answers[S.current];
  S.selected=prev?QUESTIONS[S.current].options.indexOf(prev):null;
  render();
}
async function submitContact(){
  const name=document.getElementById('inp-name').value.trim();
  const email=document.getElementById('inp-email').value.trim();
  if(!email){alert('Please enter your email to continue.');return;}
  S.name=name;S.email=email;S.screen='submitting';render();
  S.result=score(S.answers);
  const r=S.result;
  const summary=S.answers.map((a,i)=>a?'Q'+(i+1)+': '+a.text:'').filter(Boolean).join(' | ');
  await sendResult(name,email,r.name,r.movingForward,r.sunEnergy,r.limitingBeliefs.join(' | '),r.balancedState,summary);
  S.screen='result';render();
}
async function skipContact(){S.screen='submitting';render();S.result=score(S.answers);S.screen='result';render();}
function toggleBeliefs(){S.showBeliefs=!S.showBeliefs;render();}
render();
</script>
</body>
</html>
